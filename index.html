<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>METRO TYCOON v44</title>
    <style>
        :root { --bg: #0f172a; --panel: #1e293b; --accent: #38bdf8; --gold: #fbbf24; --success: #22c55e; --danger: #f43f5e; --purple: #8b5cf6; }
        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; }
        body { background: var(--bg); color: white; font-family: system-ui, sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }

        .app-container { position: relative; background: #111827; padding: 15px; border-radius: 28px; border: 2px solid #334155; display: flex; flex-direction: column; align-items: center; gap: 10px; width: 340px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .main-title { font-size: 24px; font-weight: 900; background: linear-gradient(to bottom, #fff, var(--accent)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        #musicBtn { position: absolute; top: 15px; right: 15px; width: 32px; height: 32px; border-radius: 50%; border: 1px solid #475569; background: var(--panel); color: white; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 14px; z-index: 10; }
        .music-on { border-color: var(--success) !important; box-shadow: 0 0 8px var(--success); }

        .top-nav { width: 100%; background: var(--panel); padding: 12px; border-radius: 18px; border: 1px solid #475569; }
        .lvl-progress-bg { width: 100%; height: 8px; background: #334155; border-radius: 10px; margin-top: 5px; overflow: hidden; }
        #lvl-progress-fill { width: 0%; height: 100%; background: var(--accent); transition: 0.5s; }

        #grid { display: grid; grid-template-columns: repeat(8, 34px); gap: 4px; background: #334155; padding: 8px; border-radius: 16px; }
        .cell { width: 34px; height: 34px; background: var(--bg); border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 18px; cursor: pointer; transition: 0.2s; }
        .cell:active { transform: scale(0.9); }

        .action-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 5px; width: 100%; }
        .btn-act { background: var(--panel); border: 1px solid #475569; border-radius: 12px; height: 45px; font-size: 20px; cursor: pointer; color: white; }

        .modal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 320px; background: var(--panel); border: 2px solid var(--accent); border-radius: 24px; z-index: 1000; padding: 20px; max-height: 80vh; overflow-y: auto; box-shadow: 0 0 50px rgba(0,0,0,0.9); }
        .overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 900; backdrop-filter: blur(4px); }

        .list-item { background: #0f172a; padding: 10px; border-radius: 12px; margin-bottom: 8px; border: 1px solid #334155; }
        .city-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
        .city-sq { position: relative; aspect-ratio: 1; background: #0f172a; border: 1px solid #334155; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 24px; cursor: pointer; }
        .lvl-tag { position: absolute; top: -4px; right: -4px; background: var(--purple); font-size: 8px; padding: 1px 4px; border-radius: 6px; border: 1px solid white; }
        
        .prog-b { width: 100%; height: 6px; background: #334155; border-radius: 3px; margin-top: 5px; }
        .prog-f { height: 100%; background: var(--purple); border-radius: 3px; }

        .copyright-tag { font-size: 10px; color: #64748b; margin-top: 5px; font-weight: 800; letter-spacing: 1px; border-top: 1px solid #334155; width: 100%; text-align: center; padding-top: 8px; }
    </style>
</head>
<body>

    <div class="app-container">
        <button id="musicBtn" onclick="toggleMusic()">🎵</button>
        <h1 class="main-title">METRO TYCOON</h1>
        
        <div class="top-nav">
            <div style="display:flex; justify-content:space-between;">
                <span id="score" style="color:var(--gold); font-weight:800; font-size:20px;">0</span>
                <span id="level-display" style="color:var(--accent); font-weight:bold;">LVL 1</span>
            </div>
            <div class="lvl-progress-bg"><div id="lvl-progress-fill"></div></div>
            <div id="income-val" style="font-size:10px; color:var(--success); text-align:center; margin-top:3px;">+0/5s</div>
        </div>

        <div id="grid"></div>

        <div class="action-grid">
            <button class="btn-act" onclick="openM('shop')">🛒</button>
            <button class="btn-act" onclick="openM('city')">🏙️</button>
            <button class="btn-act" onclick="openM('miss')">📋</button>
            <button class="btn-act" onclick="openM('ach')">🏆</button>
            <button class="btn-act" onclick="claimGift()">🎁</button>
        </div>

        <div class="copyright-tag">ALEXANDER ZAVODISKER</div>
    </div>

    <div class="overlay" onclick="closeM()"></div>

    <div id="mod-city" class="modal">
        <h3 style="text-align:center; color:var(--accent); margin-bottom:10px;">ניהול עיר 🏙️</h3>
        <div id="inv-list" style="display:flex; gap:8px; overflow-x:auto; margin-bottom:10px; padding:8px; background:#111827; border-radius:12px; min-height:50px;"></div>
        <div id="city-map" class="city-grid"></div>
        <button onclick="closeM()" style="width:100%; margin-top:15px; padding:10px; background:var(--danger); border:none; border-radius:12px; color:white;">סגור</button>
    </div>

    <div id="mod-shop" class="modal">
        <h3 style="text-align:center; color:var(--success); margin-bottom:10px;">חנות 🛒</h3>
        <div id="shop-list" style="display:grid; grid-template-columns:1fr 1fr; gap:10px;"></div>
        <button onclick="closeM()" style="width:100%; margin-top:15px; padding:10px; background:var(--danger); border:none; border-radius:12px; color:white;">סגור</button>
    </div>

    <div id="mod-miss" class="modal">
        <h3 style="text-align:center; color:var(--purple); margin-bottom:10px;">משימות 📋</h3>
        <div id="m-list"></div>
        <button onclick="closeM()" style="width:100%; margin-top:10px; padding:10px; background:var(--purple); border-radius:12px; color:white;">חזור</button>
    </div>

    <div id="mod-ach" class="modal">
        <h3 style="text-align:center; color:var(--gold); margin-bottom:10px;">הישגים 🏆</h3>
        <div id="a-list"></div>
        <button onclick="closeM()" style="width:100%; margin-top:10px; padding:10px; background:var(--gold); border-radius:12px;">חזור</button>
    </div>

    <audio id="bgMusic" loop><source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-8.mp3" type="audio/mpeg"></audio>

    <script>
        const types = ['💎', '💰', '🔥', '🧱', '🌲'];
        const builds = [
            {e:'🏠',c:50, inc:2, n:'בית'}, {e:'🌳',c:30, inc:1, n:'גינה'},
            {e:'🛒',c:120, inc:6, n:'סופר'}, {e:'🏭',c:450, inc:25, n:'מפעל'},
            {e:'🏙️',c:1000, inc:60, n:'גורד שחקים'}, {e:'⚡',c:2500, inc:140, n:'תחנת כוח'}
        ];

        let score = parseInt(localStorage.getItem('mc_v44_score')) || 500;
        let city = JSON.parse(localStorage.getItem('mc_v44_city')) || Array(16).fill(null);
        let cityLvls = JSON.parse(localStorage.getItem('mc_v44_lvls')) || Array(16).fill(1);
        let inv = JSON.parse(localStorage.getItem('mc_v44_inv')) || [];
        let missions = JSON.parse(localStorage.getItem('mc_v44_miss')) || [
            {t:"אסוף 50 יהלומים 💎", g:50, p:0, r:200, type:'💎'},
            {t:"פוצץ 100 פריטים", g:100, p:0, r:300, type:'any'}
        ];

        let squares = [], selected = null, animating = false, buildSel = null, isMusicPlaying = false;

        function init() {
            const g = document.getElementById('grid');
            g.innerHTML = ''; squares = [];
            for(let i=0; i<64; i++){
                const s = document.createElement('div'); s.className = 'cell';
                s.innerText = types[Math.floor(Math.random()*5)];
                s.onclick = () => clickCell(i);
                g.appendChild(s); squares.push(s);
            }
            updateStats();
            setInterval(loop, 150);
            setInterval(collectInc, 5000);
        }

        function toggleMusic() {
            const a = document.getElementById('bgMusic');
            const btn = document.getElementById('musicBtn');
            if(!isMusicPlaying) {
                a.play().catch(() => {}); isMusicPlaying = true;
                btn.classList.add('music-on'); btn.innerText = '🔇';
            } else {
                a.pause(); isMusicPlaying = false;
                btn.classList.remove('music-on'); btn.innerText = '🎵';
            }
        }

        function updateStats() {
            document.getElementById('score').innerText = score;
            const level = Math.floor(score / 2000) + 1;
            document.getElementById('level-display').innerText = `LVL ${level}`;
            document.getElementById('lvl-progress-fill').style.width = ((score % 2000) / 20) + "%";
            let ti = 0;
            city.forEach((s, i) => { if(s) { const b = builds.find(x => x.e === s); if(b) ti += (b.inc * cityLvls[i]); } });
            document.getElementById('income-val').innerText = `+${ti}/5s`;
            save();
        }

        function collectInc() {
            let ti = 0;
            city.forEach((s, i) => { if(s) { const b = builds.find(x => x.e === s); if(b) ti += (b.inc * cityLvls[i]); } });
            if(ti > 0) { score += ti; updateStats(); }
        }

        function renderCity() {
            const il = document.getElementById('inv-list'); il.innerHTML = '';
            inv.forEach((e, i) => {
                const d = document.createElement('div'); d.className = 'cell'; d.innerText = e;
                d.style.border = buildSel === i ? "2px solid white" : "1px solid #444";
                d.onclick = () => { buildSel = i; renderCity(); };
                il.appendChild(d);
            });
            const m = document.getElementById('city-map'); m.innerHTML = '';
            city.forEach((e, i) => {
                const s = document.createElement('div'); s.className = 'city-sq';
                s.innerHTML = (e || '') + (e ? `<span class="lvl-tag">L${cityLvls[i]}</span>` : '');
                s.onclick = () => {
                    if(buildSel !== null && !city[i]) {
                        city[i] = inv[buildSel]; cityLvls[i] = 1; inv.splice(buildSel, 1); buildSel = null;
                        renderCity(); updateStats();
                    } else if(city[i]) {
                        const bData = builds.find(b => b.e === city[i]);
                        const upC = bData.c * cityLvls[i];
                        if(confirm(`שדרוג ${bData.n} לרמה ${cityLvls[i]+1} ב-${upC}💰?\n(ביטול למכירה ב-${Math.floor(bData.c/2)}💰)`)) {
                            if(score >= upC) { score -= upC; cityLvls[i]++; updateStats(); renderCity(); }
                            else { alert("אין מספיק כסף!"); }
                        } else if(confirm("למכור את המבנה?")) {
                            score += Math.floor(bData.c/2); city[i] = null; cityLvls[i] = 1; renderCity(); updateStats();
                        }
                    }
                };
                m.appendChild(s);
            });
        }

        function renderShop() {
            const l = document.getElementById('shop-list'); l.innerHTML = '';
            builds.forEach(b => {
                l.innerHTML += `<div class="list-item" style="text-align:center;">
                    <div style="font-size:20px;">${b.e}</div><div>${b.n}</div>
                    <button onclick="buy('${b.e}',${b.c})" style="width:100%; background:var(--success); border:none; border-radius:8px; color:white; padding:5px; margin-top:5px; cursor:pointer;">${b.c}💰</button>
                </div>`;
            });
        }

        function renderMissions() {
            const l = document.getElementById('m-list'); l.innerHTML = '';
            missions.forEach(m => {
                const p = Math.min((m.p/m.g)*100, 100);
                l.innerHTML += `<div class="list-item">
                    <div style="display:flex; justify-content:space-between; font-size:12px;"><span>${m.t}</span><span>${m.r}💰</span></div>
                    <div class="prog-b"><div class="prog-f" style="width:${p}%"></div></div>
                </div>`;
            });
        }

        function renderAchievements() {
            const l = document.getElementById('a-list'); l.innerHTML = '';
            const achs = [{t:'מתעשר', d:'5000 זהב', v:5000}, {t:'בונה', d:'10 מבנים', v:10}];
            achs.forEach(a => {
                const done = (a.t==='מתעשר' ? score >= 5000 : city.filter(x=>x).length >= 10);
                l.innerHTML += `<div class="list-item" style="border-color:${done?'var(--success)':'#334155'}">
                    <div style="font-weight:bold;">${a.t} ${done?'✅':''}</div><div style="font-size:10px;">${a.d}</div>
                </div>`;
            });
        }

        function buy(e, c) { if(score >= c) { score -= c; inv.push(e); updateStats(); openM('city'); } }

        function clickCell(i) {
            if(animating) return;
            if(selected === null) { selected = i; squares[i].style.background = "#334155"; }
            else {
                let s1 = selected, s2 = i;
                if([s1-1, s1+1, s1-8, s1+8].includes(s2)) {
                    let v1 = squares[s1].innerText, v2 = squares[s2].innerText;
                    squares[s1].innerText = v2; squares[s2].innerText = v1;
                    if(!checkMatch()) { setTimeout(() => { squares[s1].innerText = v1; squares[s2].innerText = v2; }, 200); }
                }
                squares[selected].style.background = "var(--bg)"; selected = null;
            }
        }

        function checkMatch() {
            let m = [];
            for(let i=0; i<64; i++) {
                let c = squares[i].innerText; if(!c) continue;
                if(i%8<6 && squares[i+1].innerText===c && squares[i+2].innerText===c) m.push(i, i+1, i+2);
                if(i<48 && squares[i+8].innerText===c && squares[i+16].innerText===c) m.push(i, i+8, i+16);
            }
            return m.length > 0;
        }

        function loop() {
            if(animating) return;
            let m = [];
            for(let i=0; i<64; i++) {
                let c = squares[i].innerText; if(!c) continue;
                if(i%8<6 && squares[i+1].innerText===c && squares[i+2].innerText===c) m.push(i, i+1, i+2);
                if(i<48 && squares[i+8].innerText===c && squares[i+16].innerText===c) m.push(i, i+8, i+16);
            }
            if(m.length > 0) {
                animating = true;
                const u = [...new Set(m)];
                u.forEach(idx => {
                    missions.forEach(miss => { if(miss.type === 'any' || miss.type === squares[idx].innerText) miss.p++; });
                    squares[idx].style.transform = "scale(0)";
                    score += 5;
                });
                setTimeout(() => {
                    u.forEach(idx => { squares[idx].innerText = ''; squares[idx].style.transform = "scale(1)"; });
                    animating = false; updateStats();
                }, 300);
            }
            for(let i=55; i>=0; i--) if(squares[i+8].innerText==='' && squares[i].innerText!==''){ squares[i+8].innerText=squares[i].innerText; squares[i].innerText=''; }
            for(let i=0; i<8; i++) if(squares[i].innerText==='') squares[i].innerText=types[Math.floor(Math.random()*5)];
        }

        function openM(t) {
            document.querySelectorAll('.modal, .overlay').forEach(el=>el.style.display='none');
            document.querySelector('.overlay').style.display='block';
            document.getElementById('mod-'+t).style.display='block';
            if(t==='city') renderCity();
            if(t==='shop') renderShop();
            if(t==='miss') renderMissions();
            if(t==='ach') renderAchievements();
        }
        function closeM() { document.querySelectorAll('.modal, .overlay').forEach(el=>el.style.display='none'); buildSel = null; }
        function save() {
            localStorage.setItem('mc_v44_score', score);
            localStorage.setItem('mc_v44_city', JSON.stringify(city));
            localStorage.setItem('mc_v44_lvls', JSON.stringify(cityLvls));
            localStorage.setItem('mc_v44_inv', JSON.stringify(inv));
            localStorage.setItem('mc_v44_miss', JSON.stringify(missions));
        }
        function claimGift() { score += 500; updateStats(); alert("קיבלת 500💰!"); }
        init();
    </script>
</body>
</html>
